name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Overleaf archive
        run: |
          zip -r "CustThesis-${GITHUB_REF_NAME}.zip" \
            main.tex \
            references.bib \
            custhesis.cls \
            README.md \
            LICENSE \
            Makefile \
            latexmkrc \
            chapters \
            appendices \
            figures \
            fonts \
            assets \
            .gitignore \
            -x "*.DS_Store"

      - name: Write release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # CustThesis ${GITHUB_REF_NAME}

          CUST undergraduate thesis LaTeX template release.
          Includes the latest template files and an Overleaf-ready archive.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "CustThesis-${GITHUB_REF_NAME}.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "CustThesis ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
